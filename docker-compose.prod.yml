# Production: PostgreSQL + app + nginx reverse proxy
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ipo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-ipo_control}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ipo} -d ${POSTGRES_DB:-ipo_control}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fo_net

  web:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ipo}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ipo_control}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fo_net
    expose:
      - "5001"

  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - fo_net

volumes:
  postgres_data:

networks:
  fo_net:
    driver: bridge
